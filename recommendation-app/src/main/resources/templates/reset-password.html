<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - ShopSmart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 { font-size: 2rem; color: #667eea; font-weight: 800; }

        .icon { font-size: 3rem; text-align: center; margin-bottom: 12px; }

        .page-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
            text-align: center;
        }

        .page-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-wrap {
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: #667eea; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn:hover { opacity: 0.9; }

        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .strength-bar {
            height: 6px;
            border-radius: 3px;
            margin-top: 8px;
            background: #e0e0e0;
            transition: all 0.3s;
        }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 4px;
            font-weight: 600;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .back-link a:hover { text-decoration: underline; }

        .match-text {
            font-size: 0.8rem;
            margin-top: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🛍️ ShopSmart</h1>
        </div>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <div class="icon">🔑</div>
        <div class="page-title">Set New Password</div>
        <div class="page-subtitle">Almost done! Enter your new password below.</div>

        <form method="post" action="/reset-password">

            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" id="password"
                           placeholder="Enter new password" required
                           oninput="checkStrength(this.value); checkMatch()" />
                </div>
                <div class="strength-bar" id="strengthBar" style="width:0%"></div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword"
                       placeholder="Confirm new password" required
                       oninput="checkMatch()" />
                <div class="match-text" id="matchText"></div>
            </div>

            <button type="submit" class="btn" onclick="return validatePasswords()">
                🔒 Reset Password
            </button>
        </form>

        <div class="back-link">
            <a href="/">← Back to Login</a>
        </div>
    </div>

    <script>
        function checkStrength(password) {
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            if (password.length === 0) {
                bar.style.width = '0%';
                bar.style.background = '#e0e0e0';
                text.textContent = '';
                return;
            }

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const levels = [
                { label: '😟 Very Weak', color: '#f44336', width: '20%' },
                { label: '😐 Weak',      color: '#ff9800', width: '40%' },
                { label: '🙂 Fair',      color: '#ffeb3b', width: '60%' },
                { label: '😊 Strong',    color: '#8bc34a', width: '80%' },
                { label: '💪 Very Strong', color: '#4caf50', width: '100%' },
            ];

            const level = levels[Math.min(strength - 1, 4)];
            bar.style.background = level.color;
            bar.style.width = level.width;
            text.textContent = level.label;
            text.style.color = level.color;
        }

        function checkMatch() {
            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('confirmPassword').value;
            const text = document.getElementById('matchText');

            if (p2.length === 0) {
                text.textContent = '';
                return;
            }

            if (p1 === p2) {
                text.textContent = '✅ Passwords match!';
                text.style.color = '#4caf50';
            } else {
                text.textContent = '❌ Passwords do not match!';
                text.style.color = '#f44336';
            }
        }

        function validatePasswords() {
            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('confirmPassword').value;
            if (p1 !== p2) {
                alert('Passwords do not match!');
                return false;
            }
            if (p1.length < 6) {
                alert('Password must be at least 6 characters!');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
