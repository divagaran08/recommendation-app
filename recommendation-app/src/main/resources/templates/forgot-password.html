<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - ShopSmart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 { font-size: 2rem; color: #667eea; font-weight: 800; }

        .icon { font-size: 3rem; text-align: center; margin-bottom: 12px; }

        .page-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
            text-align: center;
        }

        .page-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: #667eea; }

        /* PIN INPUT STYLING */
        .pin-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .pin-inputs input {
            width: 60px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        .pin-inputs input:focus { border-color: #667eea; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn:hover { opacity: 0.9; }

        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .success {
            background: #e0f7e0;
            color: #2e7d32;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .back-link a:hover { text-decoration: underline; }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🛍️ ShopSmart</h1>
        </div>

        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>

        <!-- STEP 1: Enter Email -->
        <div th:if="${showPin == null}">
            <div class="icon">🔐</div>
            <div class="page-title">Forgot Password?</div>
            <div class="page-subtitle">Enter your email and we'll send you a 4-digit PIN!</div>

            <form method="post" action="/forgot-password">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your registered email" required />
                </div>
                <button type="submit" class="btn">📧 Send PIN</button>
            </form>
        </div>

        <!-- STEP 2: Enter PIN -->
        <div th:if="${showPin == true}">
            <div class="icon">🔢</div>
            <div class="page-title">Enter Your PIN</div>
            <div class="page-subtitle">Check your email and enter the 4-digit PIN below!</div>

            <form method="post" action="/verify-pin" id="pinForm">
                <input type="hidden" name="pin" id="pinValue" />
                <div class="pin-inputs">
                    <input type="text" maxlength="1" id="p1" oninput="moveNext(this, 'p2')" />
                    <input type="text" maxlength="1" id="p2" oninput="moveNext(this, 'p3')" />
                    <input type="text" maxlength="1" id="p3" oninput="moveNext(this, 'p4')" />
                    <input type="text" maxlength="1" id="p4" oninput="moveNext(this, null)" />
                </div>
                <button type="submit" class="btn" onclick="return collectPin()">✅ Verify PIN</button>
            </form>

            <hr class="divider">

            <form method="post" action="/forgot-password">
                <button type="submit" class="btn" style="background: #f5f5f5; color: #666;">
                    🔄 Resend PIN
                </button>
            </form>
        </div>

        <div class="back-link">
            <a href="/">← Back to Login</a>
        </div>
    </div>

    <script>
        function moveNext(current, nextId) {
            if (current.value.length === 1 && nextId) {
                document.getElementById(nextId).focus();
            }
        }

        function collectPin() {
            const pin = document.getElementById('p1').value +
                        document.getElementById('p2').value +
                        document.getElementById('p3').value +
                        document.getElementById('p4').value;

            if (pin.length < 4) {
                alert('Please enter the complete 4-digit PIN!');
                return false;
            }

            document.getElementById('pinValue').value = pin;
            return true;
        }
    </script>
</body>
</html>
