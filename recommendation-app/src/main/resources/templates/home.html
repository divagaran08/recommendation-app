<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ShopSmart - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 14px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        .logo { color: white; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }

        .search-bar {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 500px;
            margin: 0 30px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 18px;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .search-bar button {
            padding: 10px 22px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar button:hover { background: #e55a25; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .nav-right span { font-size: 0.95rem; }

        .btn-history {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-history:hover { background: rgba(255,255,255,0.3); }

        .btn-logout {
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-logout:hover { background: rgba(255,255,255,0.25); }

        /* CATEGORY FILTERS */
        .category-bar {
            background: white;
            padding: 14px 30px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .cat-btn {
            padding: 8px 20px;
            border-radius: 25px;
            border: 2px solid #e0e0e0;
            background: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            color: #555;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .cat-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        /* CONTAINER */
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* RECOMMENDATIONS */
        .rec-section {
            background: linear-gradient(135deg, #fff9f0, #fff3e0);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 35px;
            border: 2px solid #ffcc80;
        }

        .rec-section .section-title { color: #e65100; }

        .empty-rec {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 0.95rem;
        }

        /* GRIDS */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .rec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 16px;
        }

        /* PRODUCT CARD */
        .product-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.13);
        }

        .card-img {
            width: 100%;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .card-img.Electronics { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
        .card-img.Footwear    { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
        .card-img.Clothing    { background: linear-gradient(135deg, #fce4ec, #f8bbd0); }
        .card-img.Sports      { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
        .card-img.Home        { background: linear-gradient(135deg, #fff8e1, #ffecb3); }

        .card-body {
            padding: 14px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-category {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .cat-color-Electronics { color: #1565c0; }
        .cat-color-Footwear    { color: #6a1b9a; }
        .cat-color-Clothing    { color: #ad1457; }
        .cat-color-Sports      { color: #2e7d32; }
        .cat-color-Home        { color: #e65100; }

        .card-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: #222;
            line-height: 1.3;
        }

        .card-rating {
            font-size: 0.82rem;
            color: #f39c12;
            margin-bottom: 6px;
        }

        .card-price {
            font-size: 1.1rem;
            font-weight: 800;
            color: #333;
            margin-bottom: 12px;
        }

        .btn-buy {
            margin-top: auto;
            padding: 9px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
            width: 100%;
        }

        .btn-buy:hover { opacity: 0.85; }

        .btn-bought {
            margin-top: auto;
            padding: 9px;
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
        }

        /* REC CARD */
        .rec-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #ff6b35;
        }

        .rec-card:hover { transform: translateY(-4px); }

        .no-results {
            text-align: center;
            padding: 60px;
            color: #aaa;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">🛍️ ShopSmart</div>
    <form class="search-bar" method="get" action="/search">
        <input type="text" name="query" placeholder="Search products..." th:value="${query}" />
        <button type="submit">🔍 Search</button>
    </form>
    <div class="nav-right">
        <span>👋 <strong th:text="${user.username}"></strong></span>
        <a href="/history" class="btn-history">📦 My Orders</a>
        <a th:if="${user.admin}" href="/admin" class="btn-history" style="background: rgba(255,100,50,0.3);">⚙️ Admin</a>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<!-- CATEGORY FILTER BAR -->
<div class="category-bar">
    <a href="/home" class="cat-btn" th:classappend="${selectedCategory == null} ? 'active' : ''">🏠 All</a>
    <a href="/home?category=Electronics" class="cat-btn" th:classappend="${selectedCategory == 'Electronics'} ? 'active' : ''">📱 Electronics</a>
    <a href="/home?category=Footwear" class="cat-btn" th:classappend="${selectedCategory == 'Footwear'} ? 'active' : ''">👟 Footwear</a>
    <a href="/home?category=Clothing" class="cat-btn" th:classappend="${selectedCategory == 'Clothing'} ? 'active' : ''">👕 Clothing</a>
    <a href="/home?category=Sports" class="cat-btn" th:classappend="${selectedCategory == 'Sports'} ? 'active' : ''">⚽ Sports</a>
    <a href="/home?category=Home" class="cat-btn" th:classappend="${selectedCategory == 'Home'} ? 'active' : ''">🏡 Home</a>
</div>

<div class="container">

    <!-- RECOMMENDATIONS -->
    <div class="rec-section">
        <div class="section-title">🔥 Recommended For You</div>
        <div th:if="${recommendations == null or recommendations.isEmpty()}" class="empty-rec">
            🛒 Buy some products and we'll recommend similar items for you!
        </div>
        <div th:if="${recommendations != null and !recommendations.isEmpty()}" class="rec-grid">
            <div class="rec-card" th:each="product : ${recommendations}">
                <div class="card-img" th:classappend="${product.category}">
                    <span th:text="${product.category == 'Electronics'} ? '📱' :
                                   (${product.category == 'Footwear'} ? '👟' :
                                   (${product.category == 'Clothing'} ? '👕' :
                                   (${product.category == 'Sports'} ? '⚽' : '🏡')))"></span>
                </div>
                <div class="card-body">
                    <div class="card-category" th:classappend="'cat-color-' + ${product.category}" th:text="${product.category}"></div>
                    <div class="card-name" th:text="${product.name}"></div>
                    <div class="card-rating" th:text="'⭐ ' + ${product.rating}"></div>
                    <div class="card-price" th:text="'₹' + ${product.price}"></div>
                    <form th:action="'/buy/' + ${product.id}" method="post">
                        <button type="submit" class="btn-buy"
                                th:if="${!purchasedIds.contains(product.id)}">🛒 Buy Now</button>
                        <div class="btn-bought"
                             th:if="${purchasedIds.contains(product.id)}">✅ Purchased</div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ALL PRODUCTS -->
    <div class="section-title">
        <span th:if="${query != null}">🔍 Results for "<span th:text="${query}"></span>"</span>
        <span th:if="${query == null and selectedCategory != null}" th:text="'📂 ' + ${selectedCategory}"></span>
        <span th:if="${query == null and selectedCategory == null}">🛒 All Products</span>
    </div>

    <div th:if="${products != null and !products.isEmpty()}" class="product-grid">
        <div class="product-card" th:each="product : ${products}">
            <div class="card-img" th:classappend="${product.category}">
                <span th:text="${product.category == 'Electronics'} ? '📱' :
                               (${product.category == 'Footwear'} ? '👟' :
                               (${product.category == 'Clothing'} ? '👕' :
                               (${product.category == 'Sports'} ? '⚽' : '🏡')))"></span>
            </div>
            <div class="card-body">
                <div class="card-category" th:classappend="'cat-color-' + ${product.category}" th:text="${product.category}"></div>
                <div class="card-name" th:text="${product.name}"></div>
                <div class="card-rating" th:text="'⭐ ' + ${product.rating}"></div>
                <div class="card-price" th:text="'₹' + ${product.price}"></div>
                <form th:action="'/buy/' + ${product.id}" method="post">
                    <button type="submit" class="btn-buy"
                            th:if="${!purchasedIds.contains(product.id)}">🛒 Buy Now</button>
                    <div class="btn-bought"
                         th:if="${purchasedIds.contains(product.id)}">✅ Purchased</div>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${products == null or products.isEmpty()}" class="no-results">
        😕 No products found!
    </div>

</div>
</body>
</html>
